<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Putthamon Roster</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f7f8fc;
    --white:     #ffffff;
    --border:    #e8eaf0;
    --text:      #2d3142;
    --muted:     #9096b0;
    --today-ring:#f59e42;

    /* Pastel flight – pink */
    --flight-bg:   #ffd6e0;
    --flight-bd:   #f5a8bc;
    --flight-text: #a0325a;
    --flight-cell: #fff0f4;

    /* Light gray – day off */
    --off-bg:   #ebebeb;
    --off-bd:   #d0d0d0;
    --off-text: #999999;
    --off-cell: #f5f5f5;

    /* Light yellow – standby */
    --reserve-bg:   #fff9c4;
    --reserve-bd:   #f0d060;
    --reserve-text: #8a6800;
    --reserve-cell: #fffde8;

    /* Pastel training – lavender */
    --training-bg:   #ece6ff;
    --training-bd:   #c3aff5;
    --training-text: #5b3bcc;
    --training-cell: #f4f0ff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 40px 20px 64px;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 2px solid var(--border);
  }

  .header-left .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .header-left h1 {
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
  }

  .header-left h1 span {
    color: #4a90d9;
  }

  .header-right {
    font-size: 13px;
    color: var(--muted);
    text-align: right;
    line-height: 1.8;
  }

  /* ── Legend ─────────────────────────────────────────── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 16px;
    margin-bottom: 32px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px 5px 10px;
  }

  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Month header ────────────────────────────────────── */
  .month-block {
    margin-bottom: 40px;
  }

  .month-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }

  .month-header h2 {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    white-space: nowrap;
  }

  .month-header .line {
    flex: 1;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
  }

  /* ── Calendar grid ───────────────────────────────────── */
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 6px 0 10px;
  }

  .day-cell {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 9px 9px;
    min-height: 110px;
    position: relative;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    cursor: default;
  }

  .day-cell.empty {
    background: transparent;
    border-color: transparent;
    pointer-events: none;
  }

  .day-cell:not(.empty):hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  }

  /* today ring */
  .day-cell.today {
    border-color: var(--today-ring);
    box-shadow: 0 0 0 2px var(--today-ring);
  }

  /* cell background by type */
  .day-cell.cell-flight   { background: var(--flight-cell);   border-color: var(--flight-bd); }
  .day-cell.cell-off      { background: var(--off-cell);      border-color: var(--off-bd); }
  .day-cell.cell-reserve  { background: var(--reserve-cell);  border-color: var(--reserve-bd); }
  .day-cell.cell-training { background: var(--training-cell); border-color: var(--training-bd); }

  .day-num {
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .day-cell.today .day-num {
    color: var(--today-ring);
  }

  /* ── Badge ───────────────────────────────────────────── */
  .duty-badge {
    display: flex;
    flex-direction: column;
    font-size: 11px;
    font-weight: 700;
    border-radius: 6px;
    padding: 4px 7px;
    margin-bottom: 3px;
    line-height: 1.5;
    width: 100%;
    cursor: pointer;
  }

  .duty-badge .route { font-weight: 800; font-size: 11px; }
  .duty-badge .duty-time { font-size: 10px; font-weight: 600; opacity: 0.75; }

  .type-flight   { background: var(--flight-bg);   color: var(--flight-text); }
  .type-sb,
  .type-off,
  .type-ground,
  .type-pg       { background: var(--off-bg);      color: var(--off-text); }
  .type-reserve  { background: var(--reserve-bg);  color: var(--reserve-text); }
  .type-training { background: var(--training-bg); color: var(--training-text); }

  /* ── Modal overlay ───────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30, 35, 60, 0.35);
    backdrop-filter: blur(3px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 20px;
    padding: 28px 28px 24px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    position: relative;
    animation: popIn 0.2s ease both;
  }

  @keyframes popIn {
    from { opacity:0; transform: scale(0.93) translateY(10px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 18px;
    background: var(--bg);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 18px;
    cursor: pointer;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--border); }

  .modal-date {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .modal-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 20px;
  }

  .modal-sector {
    background: #ffffff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .modal-sector-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .modal-sector-badge {
    font-size: 12px;
    font-weight: 800;
    border-radius: 6px;
    padding: 3px 10px;
  }

  .modal-sector-route {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
  }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 12px;
  }

  .modal-field label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    display: block;
    margin-bottom: 2px;
  }

  .modal-field span {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .modal-divider {
    height: 1px;
    background: var(--border);
    margin: 10px 0;
  }

  /* ── Mobile ──────────────────────────────────────────── */
  @media(max-width: 600px) {
    header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .header-right { text-align: left; }
    .calendar { gap: 4px; }
    .day-cell { min-height: 72px; padding: 7px 5px; border-radius: 9px; }
    .duty-badge { font-size: 10px; padding: 3px 5px; }
    .day-num { font-size: 12px; }
    .legend-item { font-size: 12px; }
    .modal { padding: 22px 18px 18px; }
    .modal-title { font-size: 18px; }
  }
</style>

function typeClass(t) {
  const m = { flight:'type-flight', sb:'type-off', off:'type-off', ground:'type-off', pg:'type-off', reserve:'type-reserve', training:'type-training' };
  return m[t] || 'type-off';
}

function cellClass(t) {
  if (t === 'flight')   return 'cell-flight';
  if (t === 'reserve')  return 'cell-reserve';
  if (t === 'training') return 'cell-training';
  return 'cell-off';
}

  if (t === 'training') return '📚';

  if (!duties || !duties.length) return '';
  if (duties[0].type !== 'flight') return duties[0].label;
  const dests = duties.map(d => d.label.split(' → ')[1]).filter(s => s !== 'HKG');
  // If all land back in HKG with no foreign stop (shouldn't happen), show last dest
  return dests.length > 0 ? dests.join(', ') : duties[duties.length-1].label.split(' → ')[1];
}

// Modal
const overlay  = document.getElementById('modal-overlay');
const modalDate  = document.getElementById('modal-date');
const modalTitle = document.getElementById('modal-title');
const modalBody  = document.getElementById('modal-body');

document.getElementById('modal-close').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('open'); });

function openModal(dateStr, duties) {
  const d = new Date(dateStr + 'T00:00:00');
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  modalDate.textContent = `${dayNames[d.getDay()]}, ${d.getDate()} ${monthNames[d.getMonth()]} 2026`;

  const t = duties[0].type;
  modalTitle.textContent = t === 'flight'
    ? routeSummary(duties)
    : duties[0].label;

  let html = '';

  if (t === 'flight') {
    // Duty start from first sector
    const dutyStart = duties[0].dutyStart || '—';
    const lastD = duties[duties.length - 1];
    const dutyEnd = lastD.dutyEnd || '—';
    const dutyPeriod = lastD.dutyPeriod || '—';

    html += `<div class="modal-sector" style="background:#fff0f4; border:1.5px solid var(--flight-bd); margin-bottom:14px;">
      <div class="modal-grid">
        <div class="modal-field"><label>Duty Start</label><span>${dutyStart}</span></div>
        <div class="modal-field"><label>Duty End</label><span>${dutyEnd}</span></div>
        <div class="modal-field"><label>Duty Period</label><span>${dutyPeriod}</span></div>
      </div>
    </div>`;

    duties.forEach((d, i) => {
      html += `<div class="modal-sector">
        <div class="modal-sector-header">
          <span class="modal-sector-badge type-flight">Sector ${i+1}</span>
          <span class="modal-sector-route">${d.label}</span>
        </div>
        <div class="modal-grid">
          <div class="modal-field"><label>Flight</label><span>${d.duty}</span></div>
          <div class="modal-field"><label>Aircraft</label><span>${d.ac}</span></div>
          <div class="modal-field"><label>Departure</label><span>${d.dep}</span></div>
          <div class="modal-field"><label>Arrival</label><span>${d.arr}</span></div>
          <div class="modal-field"><label>Block</label><span>${d.block}</span></div>
        </div>
      </div>`;
    });

  } else if (t === 'reserve') {
    const d0 = duties[0];
    html += `<div class="modal-sector" style="background:#fffde8; border:1.5px solid #f0d060;">
      <div class="modal-grid">
        <div class="modal-field"><label>Duty Start</label><span>${d0.dutyStart || '—'}</span></div>
        <div class="modal-field"><label>Duty End</label><span>${d0.dutyEnd || '—'}</span></div>
        <div class="modal-field"><label>Period</label><span>${d0.period || '—'}</span></div>
      </div>
    </div>`;

  } else if (t === 'training') {
    const d0 = duties[0];
    html += `<div class="modal-sector" style="background:#f4f0ff; border:1.5px solid #c3aff5;">
      <div class="modal-grid">
        <div class="modal-field"><label>Start</label><span>${d0.dutyStart || '—'}</span></div>
        <div class="modal-field"><label>End</label><span>${d0.dutyEnd || '—'}</span></div>
        <div class="modal-field"><label>Period</label><span>${d0.period || '—'}</span></div>
      </div>
    </div>`;

  } else {
    html += `<div class="modal-sector" style="background:#f5f5f5; border:1.5px solid #d0d0d0;"><p style="color:var(--muted);font-weight:600;">Rest day — no duties scheduled.</p></div>`;
  }

  modalBody.innerHTML = html;
  overlay.classList.add('open');
}

function renderMonth(containerId, year, month) {
  const el = document.getElementById(containerId);
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    const lbl = document.createElement('div');
    lbl.className = 'day-label';
    lbl.textContent = d;
    el.appendChild(lbl);
  });

  const firstDay = new Date(year, month - 1, 1).getDay();
  for (let i = 0; i < firstDay; i++) {
    const e = document.createElement('div');
    e.className = 'day-cell empty';
    el.appendChild(e);
  }

  const daysInMonth = new Date(year, month, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const duties = rosterData[dateStr];

    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (dateStr === TODAY) cell.classList.add('today');
    if (duties && duties.length) {
      cell.classList.add(cellClass(duties[0].type));
      cell.style.cursor = 'pointer';
      cell.addEventListener('click', () => openModal(dateStr, duties));
    }

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    cell.appendChild(num);

    if (duties && duties.length) {
      const t = duties[0].type;
      const badge = document.createElement('div');
      badge.className = `duty-badge ${typeClass(t)}`;

      if (t === 'flight') {
        // Show compact route + duty start time
        const dutyStart = duties[0].dutyStart || '';
        badge.innerHTML = `<span class="route">${typeIcon(t)} ${routeSummary(duties)}</span>`
          + (dutyStart ? `<span class="duty-time">Duty ${dutyStart}</span>` : '');
      } else if (t === 'reserve') {
        badge.innerHTML = `<span class="route">${typeIcon(t)} ${duties[0].label}</span>`
          + (duties[0].dutyStart ? `<span class="duty-time">${duties[0].dutyStart}</span>` : '');
      } else if (t === 'training') {
        badge.innerHTML = `<span class="route">${typeIcon(t)} ${duties[0].label}</span>`
          + (duties[0].dutyStart ? `<span class="duty-time">${duties[0].dutyStart}</span>` : '');
      } else {
        badge.innerHTML = `<span class="route">${typeIcon(t)} ${duties[0].label}</span>`;
      }

      cell.appendChild(badge);
    }

    el.appendChild(cell);
  }
}

renderMonth('may-calendar', 2026, 5);
renderMonth('jun-calendar', 2026, 6);
</script>
</body>
</html>
